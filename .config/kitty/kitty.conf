# Generated by Home Manager.
# See https://sw.kovidgoyal.net/kitty/conf.html
font_family ComicShannsMono Nerd Font Mono
font_size 13

# Shell integration is sourced and configured manually
shell_integration no-rc no-title no-cursor
window_padding_width 5 5

allow_remote_control socket-only
copy_on_select yes
cursor_blink_interval 0
cursor_shape beam
cursor_stop_blinking_after 0
disable_ligatures cursor
hide_window_decorations yes
listen_on unix:/tmp/kitty
macos_option_as_alt yes
scrollback_lines -1
strip_trailing_spaces always
background_opacity 0.95
# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME

cursor_trail 6
cursor_shape beam
cursor_beam_thickness 1.5

tab_bar_min_tabs            1
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          KITTY{' :{}:'.format(num_windows) if num_windows > 1 else ''}

map cmd+1 send_key ctrl+1
map cmd+2 send_key ctrl+2
map cmd+3 send_key ctrl+3
map cmd+4 send_key ctrl+4
map cmd+5 send_key ctrl+5
map cmd+6 send_key ctrl+6
map cmd+7 send_key ctrl+7
map cmd+8 send_key ctrl+8
map cmd+9 send_key ctrl+9