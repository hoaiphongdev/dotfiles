# ~/.config/aerospace/aerospace.toml

start-at-login = true

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focused monitor and window
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

accordion-padding = 0

[gaps]
inner.horizontal = 0
inner.vertical   = 0
outer.left       = 0
outer.right      = 0
outer.top        = 0
outer.bottom     = 0

# Force exactly 5 workspaces
[workspace-to-monitor-force-assignment]
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'main'
5 = 'main'
6 = 'secondary'
7 = 'secondary'
8 = 'secondary'
9 = 'secondary'

[[on-window-detected]]
if.workspace = '1'
check-further-callbacks = true
run = 'layout h_accordion'

[[on-window-detected]]
if.workspace = '2'
check-further-callbacks = true
run = 'layout h_accordion'

# ── App rules → workspace ─────────────────────────────────────────
[[on-window-detected]]
if.app-name-regex-substring = 'Google Chrome|Firefox Developer Edition|Brave Browser'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-name-regex-substring = 'Cursor|Visual Studio Code'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-name-regex-substring = 'Ghostty|iTerm2|Terminal|Warp|Alacritty'
run = 'move-node-to-workspace 3'

# Float apps that don't need tiling
[[on-window-detected]]
if.app-name-regex-substring = 'System Settings|Calculator|Karabiner-Elements|Finder|Time Tracking|Sign In|Homerow'
run = 'layout floating'


# ── Keybindings ───────────────────────────────────────────────────
[mode.main.binding]

# Focus window
alt-h = 'focus --boundaries-action wrap-around-the-workspace left'
alt-j = 'focus --boundaries-action wrap-around-the-workspace down'
alt-k = 'focus --boundaries-action wrap-around-the-workspace up'
alt-l = 'focus --boundaries-action wrap-around-the-workspace right'

# Move window
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize window
alt-ctrl-h = 'resize width -50'
alt-ctrl-j = 'resize height -50'
alt-ctrl-k = 'resize height +50'
alt-ctrl-l = 'resize width +50'

# Switch workspace
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move window to workspace
alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
alt-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
alt-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
alt-shift-7 = ['move-node-to-workspace 7', 'workspace 7']
alt-shift-8 = ['move-node-to-workspace 8', 'workspace 8']
alt-shift-9 = ['move-node-to-workspace 9', 'workspace 9']

# Cycle workspaces with wraparound (5 -> 1 and 1 -> 5)
alt-tab       = 'workspace --wrap-around next'
alt-shift-tab = 'workspace --wrap-around prev'

# Toggle layout
alt-comma  = 'layout tiles horizontal vertical'
alt-period = 'layout accordion horizontal vertical'

# Fullscreen and floating
alt-f       = 'fullscreen'
alt-shift-f = 'layout floating tiling'

# Reload config
alt-shift-r = 'reload-config'